name: vocaber
description: "A new Flutter project."
publish_to: "none"

version: 1.1.0+6

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_card_swiper: ^7.0.2

  hive_ce: ^2.13.0
  hive_ce_flutter: ^2.3.0

  path_provider: ^2.1.5
  html: ^0.15.6
  http: ^1.4.0
  intl: ^0.20.2
  fl_chart: ^1.0.0
  shared_preferences: ^2.5.3
  implicitly_animated_list: ^2.3.0
  path: ^1.9.1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  hive_ce_generator: ^1.9.0

  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon_2.png
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/icon/app_icon_2.png
